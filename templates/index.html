<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Permanent Mail</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; background: #1e1e2e; color: #cdd6f4; }
        
        /* Expanded container for side-by-side layout */
        .container { max-width: 1100px; margin: auto; background: #181825; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; color: #b4befe; }
        
        .input-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; font-size: 16px; border-radius: 6px; border: 1px solid #45475a; background: #313244; color: #cdd6f4; outline: none; }
        .email-input { width: 60%; font-weight: bold; text-align: center; }
        
        button { padding: 10px 15px; font-size: 14px; cursor: pointer; font-weight: bold; background: #89b4fa; color: #11111b; border: none; border-radius: 6px; transition: 0.2s; }
        button:hover { background: #74c7ec; }
        .danger-btn { background: #f38ba8; color: #11111b; }
        .danger-btn:hover { background: #eba0ac; }
        
        .controls { margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        
        /* New Split-Pane Layout */
        .mail-layout { display: flex; gap: 20px; height: 65vh; min-height: 500px; margin-top: 20px; text-align: left;}
        
        /* Left Panel: Inbox List */
        .inbox-column { flex: 1; min-width: 300px; background: #313244; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #45475a; }
        .inbox-header { padding: 15px; background: #1e1e2e; border-bottom: 1px solid #45475a; display: flex; justify-content: space-between; align-items: center;}
        .inbox-header h3 { margin: 0; font-size: 16px; color: #cdd6f4;}
        #messages-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* Email List Items */
        .message { border-left: 4px solid #89b4fa; background: #1e1e2e; padding: 12px; margin-bottom: 8px; border-radius: 5px; cursor: pointer; transition: 0.2s; font-size: 14px;}
        .message:hover { background: #45475a; }
        .message-active { background: #45475a; border-left: 4px solid #f9e2af; } /* Highlights selected mail */
        .msg-from { font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-sub { color: #a6adc8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }

        /* Right Panel: Reading Area */
        .message-column { flex: 2; background: #cdd6f4; color: #11111b; border-radius: 8px; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; }
        #message-content { display: none; }
        .placeholder-text { text-align: center; color: #6c7086; margin-top: auto; margin-bottom: auto; font-style: italic; font-size: 18px; }
        
        /* Admin Login Screen */
        #admin-login-container { max-width: 400px; margin: 100px auto; background: #181825; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #admin-login-container input { width: 90%; margin-bottom: 15px; text-align: left; }
        #admin-login-container button { width: 97%; padding: 12px; font-size: 16px; margin-top: 10px; }

        /* Responsive Design for Mobile */
        @media (max-width: 768px) {
            .mail-layout { flex-direction: column; height: auto; }
            .inbox-column { min-height: 350px; max-height: 350px; }
            .message-column { min-height: 500px; }
            .email-input { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="admin-login-container" style="display: none;">
        <h2>Admin Login</h2>
        <input type="text" id="admin-uname" placeholder="Username">
        <input type="password" id="admin-pass" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
        <p id="login-error" style="color: #f38ba8; margin-top: 15px; font-size: 14px;"></p>
    </div>

    <div class="container" id="app-container" style="display: none;">
        <h1>Private Mail Vault</h1>
        <p style="color: #a6adc8; font-size: 14px; margin-bottom: 20px;">Direct IMAP Connection: Secure</p>
        
        <div class="input-group">
            <input type="text" id="email-address" class="email-input" readonly placeholder="Loading permanent address...">
            <button id="copy-mail-btn" onclick="copyData('email-address', 'copy-mail-btn')">Copy Mail</button>
        </div>
        
        <div class="controls">
            <button onclick="fetchEmails()">🔄 Refresh Gmail Inbox</button>
            <button class="danger-btn" onclick="adminLogout()">🚪 Logout</button>
        </div>

        <div class="mail-layout">
            
            <div class="inbox-column">
                <div class="inbox-header">
                    <h3>Inbox</h3>
                    <span style="font-size: 12px; color: #a6adc8;">(Auto-refreshes 15s)</span>
                </div>
                <div id="messages-list">
                    <p style="padding: 10px;">Connecting to Google Servers...</p>
                </div>
            </div>

            <div class="message-column">
                <div class="placeholder-text" id="read-placeholder">
                    Select an email from the left to read it here.
                </div>
                <div id="message-content"></div>
            </div>

        </div>
    </div>

    <script>
        let refreshInterval;

        window.onload = async () => {
            const res = await fetch('/api/auth/status', { cache: 'no-store' });
            const data = await res.json();
            if (data.logged_in) {
                initApp();
            } else {
                document.getElementById('admin-login-container').style.display = 'block';
            }
        };

        async function adminLogin() {
            const uname = document.getElementById('admin-uname').value;
            const pass = document.getElementById('admin-pass').value;
            const err = document.getElementById('login-error');
            
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: uname, password: pass})
            });
            const data = await res.json();
            
            if (data.success) {
                err.innerText = "";
                document.getElementById('admin-login-container').style.display = 'none';
                initApp();
            } else {
                err.innerText = data.error;
            }
        }

        async function adminLogout() {
            if (refreshInterval) clearInterval(refreshInterval);
            try { await fetch('/api/auth/logout', { method: 'POST', cache: 'no-store' }); } catch(e) {}
            window.location.replace('/');
        }

        async function initApp() {
            document.getElementById('app-container').style.display = 'block';
            
            const accountRes = await fetch('/api/account');
            const accountData = await accountRes.json();
            document.getElementById('email-address').value = accountData.email || "Error loading email";
            
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(fetchEmails, 15000); 
            fetchEmails();
        }

        async function fetchEmails() {
            const list = document.getElementById('messages-list');
            const response = await fetch('/api/messages', { cache: 'no-store' });
            const messages = await response.json();
            
            if (messages.error) {
                list.innerHTML = `<p style="color:#f38ba8; padding: 10px;">IMAP Error: ${messages.error}</p>`;
                return;
            }

            if (messages.length === 0) {
                list.innerHTML = "<p style='padding: 10px;'>No messages found in Gmail Inbox.</p>";
                return;
            }
            
            // Check if we already have an active message to keep it highlighted during refresh
            const activeMsg = document.querySelector('.message-active');
            const activeId = activeMsg ? activeMsg.id : null;

            list.innerHTML = "";
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message';
                div.id = `msg-${msg.id}`;
                
                // Keep highlighting if it was selected before the refresh
                if (activeId === div.id) {
                    div.classList.add('message-active');
                }

                div.innerHTML = `
                    <div class="msg-from">${msg.from}</div>
                    <div class="msg-sub">${msg.subject}</div>
                `;
                div.onclick = () => readMessage(msg.id, div.id);
                list.appendChild(div);
            });
        }

        async function readMessage(id, elementId) {
            // Remove highlight from all, add to the clicked one
            document.querySelectorAll('.message').forEach(el => el.classList.remove('message-active'));
            document.getElementById(elementId).classList.add('message-active');

            const placeholder = document.getElementById('read-placeholder');
            const contentDiv = document.getElementById('message-content');
            
            placeholder.style.display = "none";
            contentDiv.style.display = "block";
            contentDiv.innerHTML = "<div style='text-align:center; padding: 40px;'>Fetching secure email body...</div>";

            const response = await fetch(`/api/read?id=${id}`, { cache: 'no-store' });
            const msg = await response.json();
            if (msg.error) {
                contentDiv.innerHTML = `<div style="color:red;">Error loading message.</div>`;
                return;
            }

            // Format Plain Text to preserve line breaks if HTML isn't available
            const bodyContent = msg.htmlBody ? msg.htmlBody : `<pre style="white-space: pre-wrap; font-family: inherit; font-size: 14px;">${msg.textBody}</pre>`;
            
            contentDiv.innerHTML = `
                <h2 style="margin-top: 0; color: #1e1e2e;">${msg.subject}</h2>
                <p style="color: #45475a; margin-bottom: 5px;"><b>From:</b> ${msg.from}</p>
                <hr style="border: 0; border-top: 1px solid #a6adc8; margin: 20px 0;">
                <div style="font-size: 15px; line-height: 1.5;">${bodyContent}</div>
            `;
        }

        function copyData(inputId, btnId) {
            const input = document.getElementById(inputId);
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value);
            const btn = document.getElementById(btnId);
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = originalText, 2000);
        }
    </script>
</body>
</html>
